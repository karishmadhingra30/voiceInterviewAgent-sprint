<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PressClub AI Interviewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }
    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; }
    header p { color: #888; margin-top: 8px; font-size: 0.95rem; }
    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; font-weight: 500; }
    input[type="text"], input[type="url"], textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: #555; }
    .file-area {
      border: 1px dashed #333;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .file-area:hover { border-color: #555; background: #1a1a1a; }
    .file-area input { display: none; }
    .file-area span { color: #666; font-size: 0.9rem; }
    .file-area .filename { color: #88c; font-size: 0.85rem; margin-top: 6px; }
    .divider { display: flex; align-items: center; gap: 12px; color: #444; font-size: 0.8rem; margin: 12px 0; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #2a2a2a; }
    button[type="submit"] {
      width: 100%;
      background: #fff;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #ddd; }
    button[type="submit"]:disabled { background: #333; color: #666; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status.loading { background: #1a1a2e; border: 1px solid #334; color: #88aaff; display: block; }
    .status.error { background: #2e1a1a; border: 1px solid #433; color: #ff8888; display: block; }
    .steps { display: flex; gap: 8px; margin-bottom: 28px; }
    .step {
      flex: 1; text-align: center; font-size: 0.75rem; color: #555;
      padding: 6px; border-radius: 6px; background: #1a1a1a; border: 1px solid #2a2a2a;
    }
    .step.active { color: #fff; border-color: #555; background: #222; }
    .step.done { color: #6c6; border-color: #363; background: #1a2a1a; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #334; border-top-color: #88aaff;
      border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>PressClub AI Interviewer</h1>
    <p>Automated founder interview → newsworthy pitch briefing</p>
  </header>

  <div class="card">
    <div class="steps">
      <div class="step active" id="step-1">1. Research</div>
      <div class="step" id="step-2">2. Interview</div>
      <div class="step" id="step-3">3. Results</div>
    </div>

    <form id="research-form">
      <div class="field">
        <label>Company Website URL <span style="color:#555;font-weight:400">(optional if pasting context below)</span></label>
        <input type="url" name="company_url" placeholder="https://acme.com" />
      </div>

      <div class="field">
        <label>Founder LinkedIn URL <span style="color:#555;font-weight:400">(optional — used as backup if provided)</span></label>
        <input type="url" name="linkedin_url" placeholder="https://linkedin.com/in/founder" />
      </div>

      <div class="field">
        <label>Sales Call Transcript *</label>
        <div class="file-area" id="file-drop" onclick="document.getElementById('transcript-file').click()">
          <input type="file" id="transcript-file" name="transcript_file" accept=".txt" />
          <span>Drop .txt file here, or click to browse</span>
          <div class="filename" id="filename-display"></div>
        </div>
        <div class="divider">or paste below</div>
        <textarea name="transcript_text" id="transcript-text" rows="6" placeholder="Paste transcript text here if you are not using a file..."></textarea>
      </div>

      <div class="field">
        <label>Context / Background</label>
        <span style="display:block;color:#555;font-size:0.8rem;margin:-2px 0 8px 0;line-height:1.35">Paste context info OR provide URLs above — at least one is recommended</span>
        <textarea name="context_text" rows="4" placeholder="Paste context info here — founder name, LinkedIn URL, company description..."></textarea>
      </div>

      <button type="submit" id="submit-btn">Run Research Agent →</button>
    </form>

    <div class="status" id="status-box"></div>
  </div>

  <script>
    const fileInput = document.getElementById('transcript-file');
    const filenameDisplay = document.getElementById('filename-display');

    fileInput.addEventListener('change', () => {
      filenameDisplay.textContent = fileInput.files[0]?.name || '';
    });

    document.getElementById('research-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const btn = document.getElementById('submit-btn');
      const statusBox = document.getElementById('status-box');

      btn.disabled = true;
      btn.textContent = 'Running Research Agent...';
      statusBox.className = 'status loading';
      statusBox.innerHTML = '<span class="spinner"></span> Analyzing website, LinkedIn, and transcript. This may take 1-2 minutes...';

      const hasFile = fileInput.files.length > 0;
      const hasPaste = form.transcript_text?.value?.trim().length > 0;
      if (!hasFile && !hasPaste) {
        statusBox.className = 'status error';
        statusBox.textContent = 'Please upload or paste a sales transcript.';
        btn.disabled = false;
        btn.textContent = 'Run Research Agent →';
        return;
      }

      const transcriptFile = fileInput.files[0];
      const pasteEl = form.transcript_text;
      let transcriptText = '';
      if (transcriptFile) {
        transcriptText = await transcriptFile.text();
      } else if (pasteEl?.value?.trim()) {
        transcriptText = pasteEl.value.trim();
      }

      const payload = {
        company_url: form.company_url.value,
        linkedin_url: form.linkedin_url.value,
        transcript_text: transcriptText,
        context_text: form.context_text.value
      };

      try {
        const res = await fetch('/research', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Research failed');
        }
        const result = await res.json();
        document.getElementById('step-1').className = 'step done';
        document.getElementById('step-2').className = 'step active';
        // Hand off to interview page
        window.location.href = `/static/interview.html?session_id=${result.session_id}`;
      } catch (err) {
        statusBox.className = 'status error';
        statusBox.textContent = `Error: ${err.message}`;
        btn.disabled = false;
        btn.textContent = 'Run Research Agent →';
      }
    });
  </script>
</body>
</html>
